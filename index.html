<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quintessential Houses of Somerville</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background-color: #fff;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            min-height: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .street {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 100%;
            padding: 0 1rem;
            will-change: transform;
        }

        .hero-content {
            will-change: transform;
        }

        .street img {
            height: 200px;
            width: auto;
            flex-shrink: 0;
            margin: 0 -4px;
            object-fit: contain;
            vertical-align: bottom;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 1000px;
            margin-bottom: 3rem;
        }

        .street {
            position: relative;
            z-index: 2;
        }

        #street-row-1 img {
            height: 140px;
            filter: saturate(0.5) brightness(1.4) contrast(0.7);
        }

        #street-row-2 img {
            height: 170px;
            filter: saturate(0.8) brightness(1.2) contrast(0.85);
        }

        #street-row-3 img {
            height: 200px;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(2rem, 6vw, 4.5rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: #000;
        }

        .city-name {
            font-weight: 900;
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Quintessential Houses of <span class="city-name">Somerville</span></h1>
        </div>
        <div class="street" id="street-row-1"></div>
        <div class="street" id="street-row-2"></div>
        <div class="street" id="street-row-3"></div>
    </section>

    <div style="height: 100vh; background: #fff;"></div>

    <script>
        async function populateStreets() {
            const response = await fetch('images.json');
            const houseImages = await response.json();
            const rows = [
                document.getElementById('street-row-1'),
                document.getElementById('street-row-2'),
                document.getElementById('street-row-3')
            ];
            const totalHouses = 18;

            rows.forEach((row, rowIndex) => {
                for (let i = 0; i < totalHouses; i++) {
                    const img = document.createElement('img');
                    img.src = houseImages[(i + rowIndex * 3) % houseImages.length];
                    img.alt = 'House in Greater Boston';
                    row.appendChild(img);
                }
            });
        }

        function handleParallax() {
            const scrollY = window.scrollY;
            const row1 = document.getElementById('street-row-1');
            const row2 = document.getElementById('street-row-2');
            const row3 = document.getElementById('street-row-3');
            const heroContent = document.querySelector('.hero-content');

            // Headline
            heroContent.style.transform = `translateY(${scrollY * 0.4}px)`;

            // Top row moves slowest (furthest away)
            row1.style.transform = `translateY(${scrollY * 0.12}px)`;
            row2.style.transform = `translateY(${scrollY * 0.06}px)`;
            // Bottom row moves fastest (closest)
            row3.style.transform = `translateY(${scrollY * 0.02}px)`;
        }

        document.addEventListener('DOMContentLoaded', populateStreets);
        window.addEventListener('scroll', handleParallax);
    </script>
</body>
</html>
